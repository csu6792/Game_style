<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Style - 終極完美版</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            font-family: 'Russo One', 'Microsoft JhengHei', sans-serif; 
        }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #10141d; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
            position: relative; 
        }
        
        /* 網頁大廳背景動畫 */
        #lobby-bg { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #2d3748 0%, #10141d 100%); 
            z-index: 0; 
            overflow: hidden; 
            transition: opacity 0.5s; 
        }
        .floating-svg { 
            position: absolute; 
            opacity: 0.15; 
            animation: float 15s infinite linear; 
        }
        @keyframes float { 
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); } 
            50% { transform: scale(1.1); opacity: 0.25; } 
            100% { transform: translateY(-20vh) rotate(360deg) scale(0.8); } 
        }
        
        #game-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 800px; 
            z-index: 1; 
            padding: 10px; 
        }
        #game-container { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 20px rgba(246, 173, 85, 0.2); 
            border: 4px solid #4a5568; 
            display: none; 
        }
        
        /* 步驟 1: 初始 START 畫面 */
        #start-screen { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 20; 
            text-align: center; 
            width: 100%; 
        }
        .huge-btn { 
            padding: 20px 60px; 
            font-size: 36px; 
            border-radius: 50px; 
            background: linear-gradient(180deg, #f6ad55 0%, #dd6b20 100%); 
            color: white; 
            border: 4px solid #fff; 
            cursor: pointer; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 8px 0px #9c4221; 
            font-weight: bold; 
            transition: all 0.1s; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.4); 
            letter-spacing: 2px; 
        }
        .huge-btn:active { 
            transform: translateY(8px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), 0 0px 0px #9c4221; 
        }

        /* 步驟 2: 輸入名稱大廳 */
        #lobby { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: rgba(26, 32, 44, 0.85); 
            padding: 40px; 
            border-radius: 25px; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 2px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); 
            text-align: center; 
            z-index: 10; 
            width: 90%; 
            max-width: 380px; 
            display: none; 
        }
        #lobby h2 { 
            margin-top: 0; 
            color: #f6ad55; 
            font-size: 32px; 
            text-shadow: 0 4px 0px #744210, 0 0 10px rgba(246, 173, 85, 0.5); 
            letter-spacing: 2px; 
        }
        .input-group { 
            margin-bottom: 25px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: #cbd5e0; 
            font-size: 16px; 
            letter-spacing: 1px;
        }
        .input-group input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 2px solid #4a5568; 
            background-color: rgba(0,0,0,0.3); 
            color: white; 
            font-size: 20px; 
            outline: none; 
            transition: all 0.3s; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); 
        }
        .input-group input:focus { 
            border-color: #f6ad55; 
            box-shadow: 0 0 10px rgba(246, 173, 85, 0.4), inset 0 2px 4px rgba(0,0,0,0.5); 
        }
        #join-btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(180deg, #48bb78 0%, #2f855a 100%); 
            color: white; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 6px 0px #22543d, 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.1s; 
            text-shadow: 0 2px 2px rgba(0,0,0,0.3); 
        }
        #join-btn:hover { 
            background: linear-gradient(180deg, #68d391 0%, #38a169 100%); 
        }
        #join-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0px #22543d, 0 2px 10px rgba(0,0,0,0.5); 
        }

        /* 📱 智慧防呆：偵測手機是否為直向，若是則顯示旋轉提示蓋板 */
        @media screen and (max-width: 768px) and (orientation: portrait) {
            body::before {
                content: "🔄 請將手機轉為橫向以獲得最佳遊戲體驗";
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background-color: rgba(16, 20, 29, 0.98);
                color: #f6ad55;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 22px;
                font-weight: bold;
                z-index: 9999;
                text-align: center;
                padding: 30px;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
        }
    </style>
</head>
<body>

    <audio id="bgm-player" src="bgm.mp3" loop preload="auto"></audio>

    <div id="lobby-bg"></div>
    
    <div id="game-wrapper">
        <div id="start-screen">
            <button class="huge-btn" id="first-start-btn">▶ 開始遊戲</button>
        </div>

        <div id="lobby">
            <h2>聯機大廚房</h2>
            <div class="input-group">
                <label>房間號碼 (Room ID)</label>
                <input type="number" id="room-input" pattern="[0-9]*" inputmode="numeric" value="1234">
            </div>
            <div class="input-group">
                <label>大廚暱稱 (Nickname)</label>
                <input type="text" id="name-input" placeholder="例如: 小明">
            </div>
            <button id="join-btn">進入廚房 START</button>
        </div>

        <div id="game-container"></div>
    </div>

<script>
    // --- 1. 網頁大廳背景浮動特效 ---
    const lobbyBg = document.getElementById('lobby-bg');
    const svgIcons = [
        `<svg width="50" height="50" viewBox="0 0 100 100"><circle cx="50" cy="55" r="35" fill="#e53e3e"/><path d="M 50 20 L 50 10" stroke="#276749" stroke-width="6"/></svg>`, 
        `<svg width="50" height="50" viewBox="0 0 100 100"><path d="M 35 40 L 65 40 L 50 90 Z" fill="#dd6b20"/><path d="M 50 40 L 50 20" stroke="#38a169" stroke-width="6"/></svg>`, 
        `<svg width="50" height="50" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="#68d391"/></svg>` 
    ];
    for(let i=0; i<18; i++) {
        const div = document.createElement('div'); 
        div.className = 'floating-svg';
        div.innerHTML = svgIcons[Math.floor(Math.random()*svgIcons.length)];
        div.style.left = Math.random() * 100 + '%'; 
        div.style.animationDelay = Math.random() * 15 + 's'; 
        div.style.animationDuration = (12 + Math.random() * 10) + 's';
        lobbyBg.appendChild(div);
    }

    // --- 2. 安全全螢幕觸發器 (綁定點擊事件以繞過瀏覽器限制) ---
    function requestFullScreen() {
        const docElm = document.documentElement;
        if (docElm.requestFullscreen) {
            docElm.requestFullscreen().catch(err => console.log("全螢幕請求被阻擋或暫不支援:", err));
        } else if (docElm.webkitRequestFullscreen) { /* Safari / iOS */
            docElm.webkitRequestFullscreen();
        } else if (docElm.msRequestFullscreen) { /* IE11 */
            docElm.msRequestFullscreen();
        }
    }

    // 監聽轉向事件：翻轉時重整畫布尺寸
    window.addEventListener("orientationchange", function() {
        if (window.orientation === 90 || window.orientation === -90) {
            setTimeout(() => {
                window.scrollTo(0, 1);
                if (typeof game !== 'undefined' && game) {
                    game.scale.refresh();
                }
            }, 300);
        }
    });

    // --- 3. 全域連線與遊戲變數 ---
    let gameRoomId = "";
    let playerNickname = "";
    let roomTopic = "";
    const uniqueClientId = 'Chef_' + Math.floor(Math.random() * 10000);
    let mqttClient = null;
    let game = null; // Phaser 實例

    // 食譜數據
    const RECIPE_BOOK = [
        { name: "田園沙拉", req: { cabbage: 1, tomato: 1 } }, 
        { name: "番茄蘿蔔湯", req: { tomato: 2, carrot: 1 } },
        { name: "清炒時蔬", req: { cabbage: 2, carrot: 1 } }, 
        { name: "鮮蔬大雜燴", req: { cabbage: 1, tomato: 1, carrot: 1 } },
        { name: "雙倍茄汁", req: { tomato: 2 } }, 
        { name: "胡蘿蔔汁", req: { carrot: 2 } }
    ];
    const NAME_MAP = { tomato: '番茄', carrot: '胡蘿蔔', cabbage: '高麗菜' };

    // --- 4. 介面控制流程：點擊開始 ---
    document.getElementById('first-start-btn').addEventListener('click', () => {
        // 順應玩家點擊，進入全螢幕並撥放音效
        requestFullScreen();

        const bgm = document.getElementById('bgm-player');
        bgm.volume = 0.4;
        bgm.play().catch(e => console.warn("找不到 bgm.mp3 或受到瀏覽器策略限制:", e));

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('lobby').style.display = 'block';
    });

    // --- 5. 正式 Phaser 遊戲場景 ---
    class GameScene extends Phaser.Scene {
        constructor() { 
            super('GameScene'); 
        }

        preload() {
            // 保持空白，避免在加載期生成貼圖導致黑屏
        }

        create() {
            // 【修復】渲染器就緒後，動態生成所有精緻圖元
            this.generateGameTextures();

            // 初始數據狀態
            this.score = 0; 
            this.currentRecipe = null; 
            this.currentProgress = { tomato: 0, carrot: 0, cabbage: 0 };
            this.activeChefs = {}; 
            this.myPool = []; 

            // 桌板背景與輸送帶視覺提示
            this.add.image(400, 240, 'table_bg');
            this.add.rectangle(50, 240, 100, 480, 0x000000, 0.2); 
            this.add.rectangle(750, 240, 100, 480, 0x000000, 0.2);
            this.add.text(25, 240, '◄\n傳\n送', { fontSize: '24px', fill: '#fff', align: 'center' }).setOrigin(0.5).setAlpha(0.6);
            this.add.text(775, 240, '►\n傳\n送', { fontSize: '24px', fill: '#fff', align: 'center' }).setOrigin(0.5).setAlpha(0.6);

            // 分數板
            this.add.graphics().fillStyle(0x000000, 0.6).fillRoundedRect(15, 15, 200, 50, 10);
            this.scoreText = this.add.text(35, 40, '⭐ 分數: 0', { fontSize: '28px', fill: '#ecc94b', fontStyle: 'bold' }).setOrigin(0, 0.5);
            
            // 狀態與房間列
            this.add.graphics().fillStyle(0x000000, 0.6).fillRoundedRect(15, 420, 300, 50, 10);
            this.statusText = this.add.text(30, 445, '連線網路中...', { fontSize: '16px', fill: '#a0aec0', fontFamily: 'Microsoft JhengHei' }).setOrigin(0, 0.5);

            // 垃圾桶
            this.trashBin = this.add.image(730, 80, 'trash_bin').setDepth(2);
            this.add.text(730, 130, '垃圾桶', { fontSize: '14px', fill: '#a0aec0', fontStyle: 'bold', fontFamily: 'Microsoft JhengHei' }).setOrigin(0.5).setDepth(2);

            // 食譜看板
            this.recipeContainer = this.add.container(400, 85).setDepth(10);
            const rbg = this.add.image(0, 0, 'chalkboard');
            this.recipeTitleText = this.add.text(0, -25, '連線大廳中...', { fontSize: '24px', fill: '#f6ad55', fontStyle: 'bold' }).setOrigin(0.5);
            this.recipeItemsText = this.add.text(0, 15, '', { fontSize: '20px', fill: '#fff' }).setOrigin(0.5);
            this.recipeContainer.add([rbg, this.recipeTitleText, this.recipeItemsText]);

            // 出餐盤子
            this.plateContainer = this.add.container(400, 290).setDepth(5);
            this.plateContainer.setSize(130, 130); 
            this.plateContainer.setInteractive({ useHandCursor: true });
            this.input.setDraggable(this.plateContainer); 

            this.plateBg = this.add.image(0, 0, 'plate_3d'); 
            this.plateText = this.add.text(0, 45, '往上推：出餐 | 往下推：清盤', { fontSize: '12px', fill: '#718096', fontStyle: 'bold', fontFamily: 'Microsoft JhengHei' }).setOrigin(0.5).setAlpha(0.8);
            this.plateContainer.add([this.plateBg, this.plateText]);
            this.plateVisualItems = [];

            // 食材取得按鈕
            this.spawnBtnContainer = this.add.container(650, 430);
            const bShadow = this.add.rectangle(4, 4, 250, 60, 0x000000, 0.4).setOrigin(0.5);
            this.btnBgNormal = this.add.image(0, 0, 'btn_blue_up').setInteractive({ useHandCursor: true });
            this.btnBgPressed = this.add.image(0, 0, 'btn_blue_down').setVisible(false);
            this.btnText = this.add.text(0, -2, '取得食材', { fontSize: '18px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
            this.spawnBtnContainer.add([bShadow, this.btnBgNormal, this.btnBgPressed, this.btnText]);
            
            // 按鈕交互觸發
            this.btnBgNormal.on('pointerdown', () => {
                if (this.myPool.length === 0) return;
                this.btnBgNormal.setVisible(false); 
                this.btnBgPressed.setVisible(true); 
                this.btnText.y = 2;
                
                let foodToSpawn = this.myPool[Math.floor(Math.random() * this.myPool.length)];
                const rx = 150 + (Math.random() * 500); 
                const ry = 160 + (Math.random() * 50);
                this.spawnFood(foodToSpawn, rx, ry);
            });
            this.btnBgNormal.on('pointerup', () => { this.resetBtnState(); });
            this.btnBgNormal.on('pointerout', () => { this.resetBtnState(); });

            // --- 拖曳控制器事件流程 ---
            this.input.on('dragstart', (pointer, obj) => {
                if (obj !== this.plateContainer) { 
                    this.children.bringToTop(obj); 
                    obj.setScale(1.2); 
                    obj.setAlpha(0.9); 
                }
            });

            this.input.on('drag', (pointer, obj, dragX, dragY) => { 
                if (obj === this.plateContainer) {
                    obj.y = Phaser.Math.Clamp(dragY, -200, 450); 
                    obj.x = dragX;
                } else { 
                    obj.x = dragX; 
                    obj.y = dragY; 
                }
            });
            
            this.input.on('dragend', (pointer, obj) => {
                if (obj === this.plateContainer) {
                    if (this.plateContainer.y < 170) { 
                        this.handleServeGesture(); 
                    } else if (this.plateContainer.y > 380) { 
                        this.handleDumpPlate(); 
                    } else { 
                        this.tweens.add({ targets: this.plateContainer, x: 400, y: 290, duration: 250, ease: 'Back.easeOut' }); 
                    }
                    return;
                }

                obj.setScale(1); 
                obj.setAlpha(1);
                
                const distToTrash = Phaser.Math.Distance.Between(obj.x, obj.y, this.trashBin.x, this.trashBin.y);
                const distToPlate = Phaser.Math.Distance.Between(obj.x, obj.y, this.plateContainer.x, this.plateContainer.y);
                
                if (distToTrash < 60) {
                    this.tweens.add({ 
                        targets: obj, scale: 0, angle: 180, duration: 250, 
                        onComplete: () => { obj.destroy(); } 
                    });
                    this.tweens.add({ targets: this.trashBin, scale: 1.2, yoyo: true, duration: 80 });
                }
                else if (distToPlate < 80) { 
                    this.handleCombineToPlate(obj); 
                } 
                else if (obj.x > 700) { 
                    this.sendFood(obj.texture.key, 'right'); 
                    obj.destroy(); 
                } 
                else if (obj.x < 100) { 
                    this.sendFood(obj.texture.key, 'left'); 
                    obj.destroy(); 
                } 
                else {
                    let targetX = Phaser.Math.Clamp(obj.x, 120, 680); 
                    let targetY = Phaser.Math.Clamp(obj.y, 40, 440);
                    if (distToPlate >= 80 && distToPlate < 140) {
                        const angle = Phaser.Math.Angle.Between(this.plateContainer.x, this.plateContainer.y, targetX, targetY);
                        targetX = this.plateContainer.x + Math.cos(angle) * 150; 
                        targetY = this.plateContainer.y + Math.sin(angle) * 150;
                    }
                    this.tweens.add({ targets: obj, x: targetX, y: targetY, duration: 200, ease: 'Back.easeOut' });
                }
            });

            // 啟動連線機制
            this.connectMQTT(); 
            this.generateNewRecipe();
            
            // 心跳機制
            this.time.addEvent({ delay: 1500, loop: true, callback: this.sendPresence, callbackScope: this });
            this.time.addEvent({ delay: 1000, loop: true, callback: this.checkPresenceTimeout, callbackScope: this });
        }

        resetBtnState() { 
            this.btnBgNormal.setVisible(true); 
            this.btnBgPressed.setVisible(false); 
            this.btnText.y = -2; 
        }

        handleCombineToPlate(foodObj) {
            const foodKey = foodObj.texture.key;
            if (!this.currentProgress[foodKey]) this.currentProgress[foodKey] = 0;
            this.currentProgress[foodKey]++;

            this.tweens.add({
                targets: foodObj, 
                x: this.plateContainer.x + (Math.random() * 40 - 20), 
                y: this.plateContainer.y + (Math.random() * 40 - 20),
                scale: 0.45, 
                duration: 200, 
                ease: 'Quad.easeOut',
                onComplete: () => {
                    const localX = foodObj.x - this.plateContainer.x; 
                    const localY = foodObj.y - this.plateContainer.y;
                    const plateFood = this.add.image(localX, localY, foodKey).setScale(0.45);
                    this.plateContainer.add(plateFood); 
                    this.plateVisualItems.push(plateFood);
                    foodObj.destroy(); 
                    this.updateRecipeUI();
                }
            });
        }

        handleServeGesture() {
            let isComplete = true;
            for (let [key, needed] of Object.entries(this.currentRecipe.req)) {
                if ((this.currentProgress[key] || 0) < needed) { isComplete = false; break; }
            }

            if (isComplete) {
                this.score += 100; 
                this.scoreText.setText(`⭐ 分數: ${this.score}`);
                this.tweens.add({ targets: this.scoreText, scale: 1.3, duration: 100, yoyo: true });
                const successText = this.add.text(400, 200, '出餐成功！ +100', { fontSize: '40px', fill: '#48bb78', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: this.plateContainer, y: -150, alpha: 0, duration: 350, ease: 'Cubic.easeIn',
                    onComplete: () => {
                        this.plateVisualItems.forEach(item => item.destroy()); 
                        this.plateVisualItems = [];
                        this.currentProgress = { tomato: 0, carrot: 0, cabbage: 0 };
                        this.plateContainer.x = 400; this.plateContainer.y = 520; this.plateContainer.alpha = 1;
                        this.tweens.add({ targets: this.plateContainer, y: 290, duration: 400, ease: 'Back.easeOut' });
                        successText.destroy(); 
                        this.generateNewRecipe();
                    }
                });
            } else {
                this.tweens.add({
                    targets: this.plateContainer, x: this.plateContainer.x + 15, yoyo: true, repeat: 5, duration: 40,
                    onComplete: () => { this.tweens.add({ targets: this.plateContainer, x: 400, y: 290, duration: 200, ease: 'Back.easeOut' }); }
                });
                const failText = this.add.text(400, 200, '配方不正確！', { fontSize: '24px', fill: '#e53e3e', fontStyle: 'bold', fontFamily: 'Microsoft JhengHei', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
                this.tweens.add({ targets: failText, alpha: 0, y: 170, duration: 1000, onComplete: () => failText.destroy() });
            }
        }

        handleDumpPlate() {
            if (this.plateVisualItems.length === 0) {
                this.tweens.add({ targets: this.plateContainer, x: 400, y: 290, duration: 250, ease: 'Back.easeOut' }); 
                return;
            }
            const dumpText = this.add.text(400, 200, '清空廚具！', { fontSize: '24px', fill: '#e53e3e', fontStyle: 'bold', fontFamily: 'Microsoft JhengHei', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
            this.tweens.add({ targets: dumpText, alpha: 0, y: 170, duration: 1000, onComplete: () => dumpText.destroy() });

            this.plateVisualItems.forEach(item => item.destroy()); 
            this.plateVisualItems = [];
            this.currentProgress = { tomato: 0, carrot: 0, cabbage: 0 };
            this.updateRecipeUI();
            this.tweens.add({ targets: this.plateContainer, x: 400, y: 290, duration: 250, ease: 'Back.easeOut' });
        }

        sendPresence() { 
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(roomTopic, JSON.stringify({ type: 'presence', clientId: uniqueClientId, name: playerNickname })); 
            }
        }
        
        checkPresenceTimeout() {
            let now = Date.now(); let hasChanged = false;
            for (let id in this.activeChefs) { 
                if (id !== uniqueClientId && (now - this.activeChefs[id].lastSeen > 4000)) { delete this.activeChefs[id]; hasChanged = true; } 
            }
            if (hasChanged) this.updateChefRoles();
        }

        updateChefRoles() {
            this.activeChefs[uniqueClientId] = { name: playerNickname, lastSeen: Date.now() };
            let sortedIds = Object.keys(this.activeChefs).sort();
            let chefCount = sortedIds.length; 
            let myIndex = sortedIds.indexOf(uniqueClientId);
            const foodTypes = ['tomato', 'carrot', 'cabbage'];
            
            if (chefCount < foodTypes.length) {
                this.myPool = foodTypes.filter((_, idx) => idx % chefCount === myIndex);
            } else { 
                this.myPool = [ foodTypes[myIndex % foodTypes.length] ]; 
            }
            
            let foodNames = this.myPool.map(k => NAME_MAP[k]).join('/');
            if (chefCount === 1) { 
                this.btnText.setText('取得: 全食材'); 
                this.statusText.setText(`👤 單人練習 | 房號: ${gameRoomId}`); 
            } else { 
                this.btnText.setText(`取得: ${foodNames}`); 
                this.btnText.setFontSize(this.myPool.length > 1 ? '16px' : '18px'); 
                this.statusText.setText(`👥 連線人數: ${chefCount} | 負責: ${foodNames}`); 
            }
        }

        generateNewRecipe() {
            const randomIdx = Math.floor(Math.random() * RECIPE_BOOK.length);
            this.currentRecipe = JSON.parse(JSON.stringify(RECIPE_BOOK[randomIdx]));
            this.updateRecipeUI();
            this.tweens.add({ targets: this.recipeContainer, y: { from: -100, to: 85 }, duration: 500, ease: 'Bounce.easeOut' });
        }

        updateRecipeUI() {
            if (!this.currentRecipe) return;
            this.recipeTitleText.setText(this.currentRecipe.name); 
            let pureText = "";
            for (let [key, needed] of Object.entries(this.currentRecipe.req)) {
                let current = this.currentProgress[key] || 0; 
                let check = current >= needed ? '✔' : '';
                pureText += `${NAME_MAP[key]} ${current}/${needed} ${check}  `;
            }
            this.recipeItemsText.setText(pureText);
        }

        connectMQTT() {
            try {
                if (typeof mqtt === 'undefined') throw new Error("MQTT 未載入");
                
                mqttClient = mqtt.connect('wss://mqttgo.io:8084/mqtt', { 
                    clientId: uniqueClientId + '_' + Date.now(), connectTimeout: 4000
                });

                mqttClient.on('connect', () => { 
                    this.updateChefRoles(); 
                    mqttClient.subscribe(roomTopic); 
                });

                mqttClient.on('error', () => {
                    this.statusText.setText("⚠️ 伺服器異常，進入單人模式");
                });

                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        if (data.clientId !== uniqueClientId) {
                            if (data.type === 'food') {
                                this.receiveFood(data.foodItem, data.senderName, data.direction);
                            } else if (data.type === 'presence') { 
                                this.activeChefs[data.clientId] = { name: data.name, lastSeen: Date.now() }; 
                                this.updateChefRoles(); 
                            }
                        }
                    } catch(e) {}
                });
            } catch (error) {
                this.statusText.setText("📴 離線單人模式");
                this.updateChefRoles();
            }
        }

        sendFood(foodKey, direction) { 
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(roomTopic, JSON.stringify({ type: 'food', clientId: uniqueClientId, senderName: playerNickname, foodItem: foodKey, direction: direction })); 
            }
        }
        
        spawnFood(foodKey, x, y) {
            const food = this.add.image(x, y, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food); 
            food.setScale(0); 
            this.tweens.add({ targets: food, scale: 1, duration: 300, ease: 'Back.easeOut' });
        }

        receiveFood(foodKey, senderName, direction) {
            let startX = (direction === 'right') ? -80 : 880; 
            let targetY = 160 + (Math.random() * 80);
            const food = this.add.image(startX, targetY, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food); 
            food.setAngle(direction === 'right' ? -180 : 180);
            let targetX = (direction === 'right') ? 180 + (Math.random()*60) : 620 - (Math.random()*60);
            this.tweens.add({ targets: food, x: targetX, angle: 0, duration: 700, ease: 'Quart.easeOut' });
        }

    // --- 6. 介面控制流程：大廳進入 Phaser ---
    document.getElementById('join-btn').addEventListener('click', () => {
        // 雙重保險觸發全螢幕
        requestFullScreen();

        const roomInput = document.getElementById('room-input').value.trim(); 
        const nameInput = document.getElementById('name-input').value.trim();
        
        if (!roomInput) return alert("請輸入房號 (Room ID)"); 
        
        gameRoomId = roomInput; 
        playerNickname = nameInput || '大廚'; 
        roomTopic = `tw_game/family_style/room_${gameRoomId}`;
        
        document.getElementById('lobby').style.display = 'none'; 
        document.getElementById('lobby-bg').style.opacity = '0'; 
        setTimeout(() => { document.getElementById('lobby-bg').style.display = 'none'; }, 500);
        
        document.getElementById('game-container').style.display = 'block';
        
        // 開動畫布與框架
        game = new Phaser.Game({ 
            type: Phaser.AUTO, 
            parent: 'game-container', 
            backgroundColor: '#10141d', 
            scale: { 
                mode: Phaser.Scale.FIT, 
                autoCenter: Phaser.Scale.CENTER_BOTH, 
                width: 800, 
                height: 480 
            }, 
            scene: GameScene 
        });
    });
