<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Style - 多人房間版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/mqtt@5.3.0/dist/mqtt.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #1a202c; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        canvas { 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border-radius: 8px; 
        }
        /* 房間輸入畫面樣式 */
        #lobby {
            position: absolute;
            background-color: #2d3748;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 10;
            width: 300px;
        }
        #lobby h2 { margin-top: 0; color: #f6ad55; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #cbd5e0; font-size: 14px; }
        .input-group input { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; 
            background-color: #4a5568; color: white; font-size: 16px; box-sizing: border-box;
        }
        #join-btn {
            width: 100%; padding: 12px; border-radius: 6px; border: none;
            background-color: #48bb78; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        #join-btn:hover { background-color: #38a169; }
    </style>
</head>
<body>

<div id="lobby">
    <h2>🍳 聯機大廚房</h2>
    <div class="input-group">
        <label for="room-input">請輸入房間號碼 (例如: 1234)</label>
        <input type="number" id="room-input" placeholder="請輸入4位數字" value="1234">
    </div>
    <div class="input-group">
        <label for="name-input">你的大廚暱稱</label>
        <input type="text" id="name-input" placeholder="例如: 小明">
    </div>
    <button id="join-btn">進入廚房 ➔</button>
</div>

<script>
    // ==========================================
    // 1. 將 SVG 轉為字串 (內建蔬菜素材)
    // ==========================================
    const svgTomato = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="30" ry="8" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#e53e3e"/><path d="M 30 35 Q 40 25 55 30" fill="none" stroke="#fc8181" stroke-width="4" stroke-linecap="round"/><path d="M 50 20 L 38 28 L 50 26 L 62 28 Z" fill="#38a169"/><path d="M 50 20 L 32 18 L 45 22 Z" fill="#2f855a"/><path d="M 50 20 L 68 18 L 55 22 Z" fill="#2f855a"/><rect x="48" y="10" width="4" height="12" fill="#276749" rx="2"/></svg>`);
    const svgCarrot = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="20" ry="6" fill="rgba(0,0,0,0.15)"/><path d="M 35 40 Q 50 100 65 40 Z" fill="#dd6b20"/><path d="M 35 40 Q 50 25 65 40 Z" fill="#dd6b20"/><path d="M 42 55 L 50 58" fill="none" stroke="#c05621" stroke-width="3" stroke-linecap="round"/><path d="M 50 70 L 58 67" fill="none" stroke="#c05621" stroke-width="3" stroke-linecap="round"/><path d="M 50 32 Q 25 5 40 25" fill="none" stroke="#38a169" stroke-width="6" stroke-linecap="round"/><path d="M 50 32 Q 50 -5 50 25" fill="none" stroke="#38a169" stroke-width="6" stroke-linecap="round"/><path d="M 50 32 Q 75 5 60 25" fill="none" stroke="#38a169" stroke-width="6" stroke-linecap="round"/></svg>`);
    const svgCabbage = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#68d391"/><path d="M 20 65 Q 50 15 80 65 Q 50 90 20 65 Z" fill="#48bb78"/><path d="M 28 48 Q 50 15 72 48 Q 50 70 28 48 Z" fill="#38a169"/><path d="M 38 40 Q 50 25 62 40 Q 50 55 38 40 Z" fill="#2f855a"/><path d="M 50 35 L 50 60" fill="none" stroke="#9ae6b4" stroke-width="2" stroke-linecap="round"/><path d="M 50 48 L 40 40" fill="none" stroke="#9ae6b4" stroke-width="2" stroke-linecap="round"/><path d="M 50 48 L 60 40" fill="none" stroke="#9ae6b4" stroke-width="2" stroke-linecap="round"/></svg>`);

    // ==========================================
    // 2. 全域遊戲變數
    // ==========================================
    let gameRoomId = "";
    let playerNickname = "";
    const uniqueClientId = 'Chef_' + Math.floor(Math.random() * 10000); // 唯一的設備 ID
    let mqttClient;
    let roomTopic = ""; // 會根據輸入的房間號碼動態產生

    // ==========================================
    // 3. Phaser 遊戲場景
    // ==========================================
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        preload() {
            this.load.svg('tomato', svgTomato);
            this.load.svg('carrot', svgCarrot);
            this.load.svg('cabbage', svgCabbage);
        }

        create() {
            // 背景
            this.add.rectangle(400, 300, 800, 600, 0x2d3748);
            
            // 左右傳送邊界提示
            this.add.rectangle(50, 300, 100, 600, 0x000000, 0.2);
            this.add.rectangle(750, 300, 100, 600, 0x000000, 0.2);
            this.add.text(20, 300, '◄ 丟', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);
            this.add.text(780, 300, '丟 ►', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);

            // 房間與暱稱 UI 顯示
            this.statusText = this.add.text(400, 30, '正在同步房間...', { fontSize: '24px', fill: '#ecc94b' }).setOrigin(0.5);
            this.add.text(400, 70, `大廚: ${playerNickname} | 房間號碼: ${gameRoomId}`, { fontSize: '18px', fill: '#a0aec0' }).setOrigin(0.5);

            // 🛒 產生食材按鈕
            const spawnBtn = this.add.text(400, 530, '🛒 點我拿食材', { fontSize: '24px', fill: '#fff', backgroundColor: '#3182ce', padding: { x: 20, y: 10 } })
                .setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            spawnBtn.on('pointerdown', () => {
                const foods = ['tomato', 'carrot', 'cabbage'];
                const randomFood = foods[Math.floor(Math.random() * foods.length)];
                this.spawnFood(randomFood, 400, 300);
            });

            // 拖曳處理
            this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
                gameObject.x = dragX;
                gameObject.y = dragY;
            });

            this.input.on('dragend', (pointer, gameObject) => {
                // 如果拉到左右兩側邊界
                if (gameObject.x < 100 || gameObject.x > 700) {
                    this.sendFood(gameObject.texture.key);
                    gameObject.destroy(); // 畫面上消失
                } else {
                    // 沒丟成功，彈回中間
                    this.tweens.add({ targets: gameObject, x: 400, y: 300, duration: 200, ease: 'Power2' });
                }
            });

            // 開始連線 MQTT
            this.connectMQTT();
        }

        connectMQTT() {
            // 連線至加密的 mqttgo.io
            mqttClient = mqtt.connect('wss://mqttgo.io:8084/mqtt', { clientId: uniqueClientId + '_' + Date.now() });

            mqttClient.on('connect', () => {
                this.statusText.setText('🟢 廚房已連線！快叫朋友加入同房間');
                // 訂閱特定房間的專屬頻道
                mqttClient.subscribe(roomTopic);
            });

            mqttClient.on('message', (topic, message) => {
                if (topic === roomTopic) {
                    const data = JSON.parse(message.toString());
                    // 只有當發送者不是自己時，才接收食材
                    if (data.clientId !== uniqueClientId) {
                        this.receiveFood(data.foodItem, data.senderName);
                    }
                }
            });
        }

        sendFood(foodKey) {
            if (mqttClient && mqttClient.connected) {
                const payload = JSON.stringify({ 
                    clientId: uniqueClientId, 
                    senderName: playerNickname, 
                    foodItem: foodKey 
                });
                mqttClient.publish(roomTopic, payload, { qos: 0 });
            }
        }

        spawnFood(foodKey, x, y) {
            const food = this.add.image(x, y, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            food.setScale(0);
            this.tweens.add({ targets: food, scale: 1, duration: 300, ease: 'Back.easeOut' });
        }

        receiveFood(foodKey, senderName) {
            // 提示是誰送過來的
            const tipText = this.add.text(400, 150, `來自 ${senderName} 的食材！`, { fontSize: '18px', fill: '#48bb78' }).setOrigin(0.5);
            this.time.delayedCall(1500, () => { tipText.destroy(); });

            // 生成食材
            const food = this.add.image(400, -50, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            this.tweens.add({ targets: food, y: 300, duration: 600, ease: 'Bounce.easeOut' });
        }
    }

    // ==========================================
    // 4. HTML 大廳事件：監聽加入房間按鈕
    // ==========================================
    document.getElementById('join-btn').addEventListener('click', () => {
        const roomInput = document.getElementById('room-input').value.trim();
        const nameInput = document.getElementById('name-input').value.trim();

        if (!roomInput) {
            alert('請輸入房間號碼！');
            return;
        }

        // 儲存全域變數
        gameRoomId = roomInput;
        playerNickname = nameInput || '無名大廚_' + Math.floor(Math.random() * 100);
        
        // 根據房間號碼動態設定 MQTT 頻道，避免和其他玩家撞車
        roomTopic = `tw_game/family_style/room_${gameRoomId}`;

        // 隱藏 HTML 登入畫面
        document.getElementById('lobby').style.display = 'none';

        // 啟動 Phaser 遊戲
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: document.body,
            scene: GameScene
        };
        const game = new Phaser.Game(config);
    });
</script>

</body>
</html>
