<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Style - 質感大廚房</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            font-family: 'Russo One', 'Microsoft JhengHei', sans-serif; /* 套用遊戲字型 */
        }
        body { 
            margin: 0; padding: 0; background-color: #10141d; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; color: white;
            touch-action: none; position: relative;
        }

        /* --- 大廳 SVG 動態背景 --- */
        #lobby-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2d3748 0%, #10141d 100%);
            z-index: 0; overflow: hidden;
        }
        .floating-svg { position: absolute; opacity: 0.15; animation: float 15s infinite linear; }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); }
            50% { transform: scale(1.1); opacity: 0.25; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(0.8); }
        }

        /* --- 大廳 UI 介面 (美化版) --- */
        #game-wrapper { position: relative; width: 100%; max-width: 800px; z-index: 1; padding: 10px; }
        #game-container { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 20px rgba(246, 173, 85, 0.2); 
            border: 4px solid #4a5568;
        }
        
        #lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            /* 毛玻璃效果 */
            background-color: rgba(26, 32, 44, 0.85); padding: 40px; border-radius: 25px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); text-align: center; 
            z-index: 10; width: 90%; max-width: 380px;
        }
        #lobby h2 { 
            margin-top: 0; color: #f6ad55; font-size: 32px; 
            text-shadow: 0 4px 0px #744210, 0 0 10px rgba(246, 173, 85, 0.5);
            letter-spacing: 2px;
        }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; margin-bottom: 10px; color: #cbd5e0; font-size: 16px; letter-spacing: 1px;}
        .input-group input { 
            width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #4a5568; 
            background-color: rgba(0,0,0,0.3); color: white; font-size: 20px; outline: none; 
            transition: all 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .input-group input:focus { border-color: #f6ad55; box-shadow: 0 0 10px rgba(246, 173, 85, 0.4), inset 0 2px 4px rgba(0,0,0,0.5); }
        
        #join-btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: linear-gradient(180deg, #48bb78 0%, #2f855a 100%); 
            color: white; font-size: 22px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0px #22543d, 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.1s; text-shadow: 0 2px 2px rgba(0,0,0,0.3);
        }
        #join-btn:hover { background: linear-gradient(180deg, #68d391 0%, #38a169 100%); }
        #join-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #22543d, 0 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="lobby-bg"></div>

    <div id="game-wrapper">
        <div id="lobby">
            <h2>聯機大廚房</h2>
            <div class="input-group">
                <label>房間號碼 (Room ID)</label>
                <input type="number" id="room-input" pattern="[0-9]*" inputmode="numeric" value="1234">
            </div>
            <div class="input-group">
                <label>大廚暱稱 (Nickname)</label>
                <input type="text" id="name-input" placeholder="例如: 小明">
            </div>
            <button id="join-btn">開始烹飪 START</button>
        </div>
        <div id="game-container"></div>
    </div>

<script>
    // ==========================================
    // 大廳背景動畫生成
    // ==========================================
    const lobbyBg = document.getElementById('lobby-bg');
    const svgIcons = [
        `<svg width="50" height="50" viewBox="0 0 100 100"><circle cx="50" cy="55" r="35" fill="#e53e3e"/><path d="M 50 20 L 50 10" stroke="#276749" stroke-width="6"/></svg>`, 
        `<svg width="50" height="50" viewBox="0 0 100 100"><path d="M 35 40 L 65 40 L 50 90 Z" fill="#dd6b20"/><path d="M 50 40 L 50 20" stroke="#38a169" stroke-width="6"/></svg>`, 
        `<svg width="50" height="50" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="#68d391"/></svg>` 
    ];
    for(let i=0; i<18; i++) {
        const div = document.createElement('div');
        div.className = 'floating-svg';
        div.innerHTML = svgIcons[Math.floor(Math.random()*svgIcons.length)];
        div.style.left = Math.random() * 100 + '%';
        div.style.animationDelay = Math.random() * 15 + 's';
        div.style.animationDuration = (12 + Math.random() * 10) + 's';
        lobbyBg.appendChild(div);
    }

    // ==========================================
    // 全域變數
    // ==========================================
    let gameRoomId = "", playerNickname = "", roomTopic = "";
    const uniqueClientId = 'Chef_' + Math.floor(Math.random() * 10000);
    let mqttClient = null;

    const RECIPE_BOOK = [
        { name: "田園沙拉", req: { cabbage: 1, tomato: 1 } },
        { name: "番茄蘿蔔湯", req: { tomato: 2, carrot: 1 } },
        { name: "清炒時蔬", req: { cabbage: 2, carrot: 1 } },
        { name: "鮮蔬大雜燴", req: { cabbage: 1, tomato: 1, carrot: 1 } },
        { name: "雙倍茄汁", req: { tomato: 2 } },
        { name: "胡蘿蔔汁", req: { carrot: 2 } }
    ];
    const NAME_MAP = { tomato: '番茄', carrot: '胡蘿蔔', cabbage: '高麗菜' };

    // ==========================================
    // Phaser 遊戲場景
    // ==========================================
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        create() {
            this.score = 0;
            this.currentRecipe = null;
            this.currentProgress = { tomato: 0, carrot: 0, cabbage: 0 };
            this.activeChefs = {};
            this.myPool = []; 

            this.generateGameTextures();

            // --- 繪製畫布背景 ---
            this.add.image(400, 240, 'table_bg');
            
            // 邊界傳送提示 (修正為更好看的視覺)
            const leftZone = this.add.rectangle(50, 240, 100, 480, 0x000000, 0.2);
            const rightZone = this.add.rectangle(750, 240, 100, 480, 0x000000, 0.2);
            this.add.text(25, 240, '◄\n傳\n送', { fontSize: '24px', fill: '#fff', align: 'center', fontFamily: 'Russo One' }).setOrigin(0.5).setAlpha(0.6);
            this.add.text(775, 240, '►\n傳\n送', { fontSize: '24px', fill: '#fff', align: 'center', fontFamily: 'Russo One' }).setOrigin(0.5).setAlpha(0.6);

            // --- 遊戲 HUD (分數與狀態) ---
            // 分數背景框
            this.add.graphics().fillStyle(0x000000, 0.6).fillRoundedRect(15, 15, 200, 50, 10);
            this.scoreText = this.add.text(35, 40, '⭐ 分數: 0', { fontSize: '28px', fill: '#ecc94b', fontStyle: 'bold', fontFamily: 'Russo One' }).setOrigin(0, 0.5);

            // 狀態欄背景框 (左下角)
            this.add.graphics().fillStyle(0x000000, 0.6).fillRoundedRect(15, 420, 300, 50, 10);
            this.statusText = this.add.text(30, 445, '連線初始化...', { fontSize: '16px', fill: '#a0aec0', fontFamily: 'Microsoft JhengHei' }).setOrigin(0, 0.5);

            // --- 中央出餐盤 (立體版) ---
            this.plate = this.add.image(400, 260, 'plate_3d');
            this.add.text(400, 310, '出餐區', { fontSize: '16px', fill: '#718096', fontStyle: 'bold' }).setOrigin(0.5).setAlpha(0.7);

            // --- 📜 食譜 UI (黑板木框風格) ---
            const recipeContainer = this.add.container(400, 85);
            const rbg = this.add.image(0, 0, 'chalkboard'); // 使用新的黑板材質
            this.recipeTitleText = this.add.text(0, -25, '準備中...', { fontSize: '24px', fill: '#f6ad55', fontStyle: 'bold', fontFamily: 'Russo One' }).setOrigin(0.5);
            this.recipeItemsText = this.add.text(0, 15, '', { fontSize: '20px', fill: '#fff', fontFamily: 'Russo One' }).setOrigin(0.5);
            recipeContainer.add([rbg, this.recipeTitleText, this.recipeItemsText]);
            
            // --- 🛒 拿取食材按鈕 (立體風格) ---
            this.spawnBtnContainer = this.add.container(650, 430);
            const bShadow = this.add.rectangle(4, 4, 250, 60, 0x000000, 0.4).setOrigin(0.5); // 按鈕陰影
            this.btnBgNormal = this.add.image(0, 0, 'btn_blue_up').setInteractive({ useHandCursor: true });
            this.btnBgPressed = this.add.image(0, 0, 'btn_blue_down').setVisible(false); // 按下狀態
            
            this.btnText = this.add.text(0, -2, '取得：初始化中', { fontSize: '18px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Russo One' }).setOrigin(0.5);
            this.spawnBtnContainer.add([bShadow, this.btnBgNormal, this.btnBgPressed, this.btnText]);
            
            this.btnBgNormal.on('pointerdown', () => {
                if (this.myPool.length === 0) return;
                // 按下動畫：換圖並向下微移
                this.btnBgNormal.setVisible(false);
                this.btnBgPressed.setVisible(true);
                this.btnText.y = 2;

                let foodToSpawn = this.myPool[Math.floor(Math.random() * this.myPool.length)];
                const rx = 400 + (Math.random() * 80 - 40);
                const ry = 360 + (Math.random() * 50 - 25);
                this.spawnFood(foodToSpawn, rx, ry);
            });
            
            this.btnBgNormal.on('pointerup', () => { this.resetBtnState(); });
            this.btnBgNormal.on('pointerout', () => { this.resetBtnState(); }); // 手指滑出按鈕也要重置

            // 拖曳處理邏輯
            this.input.on('dragstart', (p, obj) => {
                this.children.bringToTop(obj); // 拖曳時放到最上層
                obj.setScale(1.2); obj.setAlpha(0.9);
                // 加個簡單的發光特效 (外框)
                obj.setTint(0xffffff);
            });

            this.input.on('drag', (p, obj, dx, dy) => { obj.x = dx; obj.y = dy; });
            
            this.input.on('dragend', (p, obj) => {
                obj.setScale(1); obj.setAlpha(1); obj.clearTint();
                
                const distToPlate = Phaser.Math.Distance.Between(obj.x, obj.y, this.plate.x, this.plate.y);
                
                if (distToPlate < 90) {
                    this.handleCookingDrop(obj);
                } 
                else if (obj.x > 700) { 
                    this.sendFood(obj.texture.key, 'right'); 
                    obj.destroy(); 
                } 
                else if (obj.x < 100) { 
                    this.sendFood(obj.texture.key, 'left'); 
                    obj.destroy(); 
                } 
                else {
                    obj.x = Phaser.Math.Clamp(obj.x, 60, 740);
                    obj.y = Phaser.Math.Clamp(obj.y, 40, 440);
                }
            });

            this.connectMQTT();
            this.generateNewRecipe();

            this.time.addEvent({ delay: 1500, loop: true, callback: this.sendPresence, callbackScope: this });
            this.time.addEvent({ delay: 1000, loop: true, callback: this.checkPresenceTimeout, callbackScope: this });
        }

        resetBtnState() {
            this.btnBgNormal.setVisible(true);
            this.btnBgPressed.setVisible(false);
            this.btnText.y = -2;
        }

        // ==========================
        // 池化動態分配系統
        // ==========================
        sendPresence() {
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(roomTopic, JSON.stringify({
                    type: 'presence', clientId: uniqueClientId, name: playerNickname
                }));
            }
        }

        checkPresenceTimeout() {
            let now = Date.now();
            let hasChanged = false;
            for (let id in this.activeChefs) {
                if (id !== uniqueClientId && (now - this.activeChefs[id].lastSeen > 4000)) {
                    delete this.activeChefs[id]; hasChanged = true;
                }
            }
            if (hasChanged) { this.updateChefRoles(); }
        }

        updateChefRoles() {
            this.activeChefs[uniqueClientId] = { name: playerNickname, lastSeen: Date.now() };
            let sortedIds = Object.keys(this.activeChefs).sort();
            let chefCount = sortedIds.length;
            let myIndex = sortedIds.indexOf(uniqueClientId);
            const foodTypes = ['tomato', 'carrot', 'cabbage'];
            
            if (chefCount < foodTypes.length) {
                this.myPool = foodTypes.filter((_, index) => index % chefCount === myIndex);
            } else {
                this.myPool = [ foodTypes[myIndex % foodTypes.length] ];
            }
            
            let foodNames = this.myPool.map(key => NAME_MAP[key]).join('/');
            
            if (chefCount === 1) {
                this.btnText.setText('取得: 全食材模式');
                this.statusText.setText(`👤 獨自烹飪中 | 無連線合作`);
            } else {
                this.btnText.setText(`取得: ${foodNames}`);
                this.btnText.setFontSize(this.myPool.length > 1 ? '16px' : '18px'); // 兼職太多時縮小字體
                this.statusText.setText(`👥 廚房人數: ${chefCount} | 負責: ${foodNames}`);
            }
        }

        // ==========================
        // 訂單邏輯 (加入更多視覺汁)
        // ==========================
        generateNewRecipe() {
            const randomIdx = Math.floor(Math.random() * RECIPE_BOOK.length);
            this.currentRecipe = JSON.parse(JSON.stringify(RECIPE_BOOK[randomIdx]));
            this.currentProgress = { tomato: 0, carrot: 0, cabbage: 0 };
            this.updateRecipeUI();

            // 看板掉下來的動畫
            this.tweens.add({ targets: this.recipeTitleText.parentContainer, y: { from: -100, to: 85 }, duration: 500, ease: 'Bounce.easeOut' });
        }

        updateRecipeUI() {
            if (!this.currentRecipe) return;
            this.recipeTitleText.setText(this.currentRecipe.name);
            let pureText = "";
            for (let [key, needed] of Object.entries(this.currentRecipe.req)) {
                let current = this.currentProgress[key] || 0;
                let check = current >= needed ? '✔' : '';
                pureText += `${NAME_MAP[key]} ${current}/${needed} ${check}  `;
            }
            this.recipeItemsText.setText(pureText);
        }

        handleCookingDrop(foodObj) {
            const foodKey = foodObj.texture.key;
            const needed = this.currentRecipe.req[foodKey] || 0;
            const current = this.currentProgress[foodKey] || 0;

            if (current < needed) {
                this.currentProgress[foodKey]++;
                // 吸入盤子的立體感起動
                this.tweens.add({
                    targets: foodObj, x: this.plate.x, y: this.plate.y - 10, scale: 0, angle: 180, duration: 250, ease: 'Back.easeIn',
                    onComplete: () => {
                        foodObj.destroy();
                        this.checkRecipeCompletion();
                    }
                });
            } else {
                // 不需要時，盤子立體抖動
                this.tweens.add({ targets: this.plate, y: this.plate.y + 5, yoyo: true, repeat: 5, duration: 30, onComplete:()=>this.plate.y=260 });
                this.tweens.add({ targets: foodObj, x: foodObj.x + (foodObj.x > 400 ? 50 : -50), y: foodObj.y + 30, duration: 200, ease: 'Power2' });
            }
        }

        checkRecipeCompletion() {
            this.updateRecipeUI();
            let isComplete = true;
            for (let [key, needed] of Object.entries(this.currentRecipe.req)) {
                if ((this.currentProgress[key] || 0) < needed) { isComplete = false; break; }
            }

            if (isComplete) {
                this.score += 100;
                this.scoreText.setText(`⭐ 分數: ${this.score}`);
                
                // 分數跳動動畫 (Juice)
                this.tweens.add({ targets: this.scoreText, scale: 1.3, duration: 100, yoyo: true, ease: 'Quad.easeOut' });

                // 出餐完成特效字
                const successText = this.add.text(400, 260, '出餐完成！ +100', { fontSize: '40px', fill: '#48bb78', fontStyle: 'bold', fontFamily: 'Russo One', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
                this.tweens.add({
                    targets: successText, y: 150, alpha: 0, scale: 1.2, duration: 1200, ease: 'Quad.easeIn',
                    onComplete: () => { successText.destroy(); this.generateNewRecipe(); }
                });
                
                // 盤子發光
                this.tweens.add({ targets: this.plate, tint: 0x48bb78, duration: 100, yoyo: true, repeat: 1 });
            }
        }

        // ==========================
        // 最新修改：UI 材質立體化生成
        // ==========================
        generateGameTextures() {
            let g = this.make.graphics({ x: 0, y: 0, add: false });

            // 1. 🍗 質感木頭餐桌背景 (更深色、更有紋理)
            g.fillStyle(0x654321, 1); g.fillRect(0, 0, 800, 480);
            g.lineStyle(3, 0x4e341b, 0.6);
            for(let i=0; i<18; i++) { 
                let y = i * 30;
                g.moveTo(0, y); g.lineTo(800, y + (Math.random()*15 - 7)); 
            }
            g.strokePath();
            // 增加四周暗角陰影 (Vignette)
            g.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0, 0, 0.4, 0.4);
            g.fillRect(0, 0, 800, 480);
            g.generateTexture('table_bg', 800, 480); g.clear();

            // 2. 🍽️ 陶瓷餐盤 (立體陶瓷感)
            // 底層陰影
            g.fillStyle(0x000000, 0.3); g.fillCircle(65, 68, 58);
            // 陶瓷主體 (圓盤)
            g.fillStyle(0xfffffd, 1); g.fillCircle(60, 60, 58); // 微米色
            // 內圈立體凹陷陰影
            g.lineStyle(6, 0xdcdcdc); g.strokeCircle(60, 60, 42); 
            g.lineStyle(2, 0xbfbfbf); g.strokeCircle(60, 60, 45);
            // 表面高光
            g.fillStyle(0xffffff, 0.8); g.fillEllipse(40, 40, 20, 10);
            g.generateTexture('plate_3d', 130, 130); g.clear();

            // 3. 📜 食譜黑板 (木框黑板)
            // 木框
            g.fillStyle(0x8B4513, 1); g.fillRoundedRect(0, 0, 380, 110, 8);
            g.lineStyle(4, 0x5a300a); g.strokeRoundedRect(2, 2, 376, 106, 8);
            // 黑板面
            g.fillStyle(0x1a202c, 1); g.fillRoundedRect(10, 10, 360, 90, 5);
            // 黑板微粉塵感
            g.fillStyle(0xffffff, 0.05);
            for(let i=0; i<50; i++) { g.fillCircle(10 + Math.random()*360, 10+Math.random()*90, 1); }
            g.generateTexture('chalkboard', 380, 110); g.clear();

            // 4. 🛒 按鈕材質 (立體按鈕)
            // (1) 正常狀態 (凸起)
            g.fillStyle(0x2b6cb0, 1); g.fillRoundedRect(0, 0, 250, 60, 10); // 深藍底
            g.fillStyle(0x3182ce, 1); g.fillRoundedRect(0, 0, 250, 55, 10); // 主色
            g.fillStyle(0x63b3ed, 0.5); g.fillRoundedRect(5, 5, 240, 15, 5); // 頂部高光
            g.generateTexture('btn_blue_up', 250, 60); g.clear();
            // (2) 按下狀態 (凹陷)
            g.fillStyle(0x2b6cb0, 1); g.fillRoundedRect(0, 0, 250, 60, 10); // 深藍底
            g.fillStyle(0x2c5282, 1); g.fillRoundedRect(0, 5, 250, 55, 10); // 暗色主體下移
            g.generateTexture('btn_blue_down', 250, 60); g.clear();

            // 🍅 番茄 (增加高光與蒂頭立體感)
            g.fillStyle(0x000000, 0.2); g.fillCircle(54, 59, 32); // 陰影
            g.fillStyle(0xe53e3e, 1); g.fillCircle(50, 55, 30);
            g.fillStyle(0xfc8181, 0.6); g.fillEllipse(35, 40, 10, 5); // 高光
            g.fillStyle(0x276749, 1); g.fillRect(47, 10, 6, 18); // 梗
            g.fillStyle(0x38a169, 1); g.fillTriangle(50, 25, 25, 30, 75, 30); // 葉
            g.generateTexture('tomato', 100, 100); g.clear();

            // 🥕 胡蘿蔔 (增加立體線條)
            g.fillStyle(0x000000, 0.2); g.fillTriangle(39, 39, 69, 39, 54, 89); // 陰影
            g.fillStyle(0xdd6b20, 1); g.fillTriangle(35, 35, 65, 35, 50, 85);
            g.lineStyle(2, 0xc05621, 0.8); // 紋理線
            g.moveTo(43, 45); g.lineTo(55, 48); g.moveTo(45, 60); g.lineTo(53, 62); g.strokePath();
            g.fillStyle(0x38a169, 1); g.fillRect(47, 15, 6, 20); // 葉梗
            g.fillCircle(44, 18, 5); g.fillCircle(56, 18, 5); g.fillCircle(50, 12, 5);
            g.generateTexture('carrot', 100, 100); g.clear();

            // 🥬 高麗菜 (層次感強化)
            g.fillStyle(0x000000, 0.2); g.fillCircle(54, 54, 37); // 陰影
            g.fillStyle(0x2f855a, 1); g.fillCircle(50, 50, 35); // 外葉
            g.fillStyle(0x48bb78, 1); g.fillCircle(50, 50, 25); // 中葉
            g.fillStyle(0x9ae6b4, 1); g.fillCircle(50, 50, 15); // 內芯
            g.lineStyle(2, 0xffffff, 0.2); g.strokeCircle(50, 50, 25); g.strokeCircle(50, 50, 15);
            g.generateTexture('cabbage', 100, 100); g.destroy();
        }

        connectMQTT() {
            mqttClient = mqtt.connect('wss://mqttgo.io:8084/mqtt', { clientId: uniqueClientId + '_' + Date.now() });
            mqttClient.on('connect', () => {
                this.updateChefRoles();
                mqttClient.subscribe(roomTopic);
            });
            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                if (data.clientId !== uniqueClientId) {
                    if (data.type === 'food') {
                        this.receiveFood(data.foodItem, data.senderName, data.direction);
                    } else if (data.type === 'presence') {
                        this.activeChefs[data.clientId] = { name: data.name, lastSeen: Date.now() };
                        this.updateChefRoles();
                    }
                }
            });
        }

        sendFood(foodKey, direction) {
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(roomTopic, JSON.stringify({ 
                    type: 'food', clientId: uniqueClientId, senderName: playerNickname, foodItem: foodKey, direction: direction 
                }));
            }
        }

        spawnFood(foodKey, x, y) {
            const food = this.add.image(x, y, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            // 生成時有彈跳出現動畫
            food.setScale(0); this.tweens.add({ targets: food, scale: 1, duration: 300, ease: 'Back.easeOut' });
        }

        receiveFood(foodKey, senderName, direction) {
            let startX = (direction === 'right') ? -80 : 880;
            let targetY = 200 + (Math.random() * 180);
            const food = this.add.image(startX, targetY, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            // 加入飛入時的旋轉效果
            food.setAngle(direction === 'right' ? -180 : 180);
            
            let targetX = (direction === 'right') ? 180 + (Math.random()*80) : 620 - (Math.random()*80);
            this.tweens.add({ targets: food, x: targetX, angle: 0, duration: 700, ease: 'Quart.easeOut' });
        }
    }

    // ==========================================
    // 啟動按鈕事件
    // ==========================================
    document.getElementById('join-btn').addEventListener('click', () => {
        const roomInput = document.getElementById('room-input').value.trim();
        const nameInput = document.getElementById('name-input').value.trim();
        if (!roomInput) return alert("請輸入房號 (Room ID)");

        gameRoomId = roomInput;
        playerNickname = nameInput || '大廚';
        roomTopic = `tw_game/family_style/room_${gameRoomId}`;

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('lobby-bg').style.display = 'none';

        new Phaser.Game({
            type: Phaser.AUTO,
            parent: 'game-container',
            backgroundColor: '#10141d',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 480 },
            scene: GameScene
        });
    });
</script>

</body>
