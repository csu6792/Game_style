<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Style - 內建 Console 除錯版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #1a202c; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        #game-wrapper {
            position: relative;
            width: 800px;
            height: 480px; /* 稍微縮小高度，留空間給 Console */
        }
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2d3748;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
            width: 320px;
            box-sizing: border-box;
        }
        #lobby h2 { margin-top: 0; color: #f6ad55; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #cbd5e0; font-size: 14px; }
        .input-group input { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; 
            background-color: #4a5568; color: white; font-size: 16px; box-sizing: border-box;
        }
        #join-btn {
            width: 100%; padding: 12px; border-radius: 6px; border: none;
            background-color: #48bb78; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer;
        }
        /* 網頁內建 Console 樣式 */
        #visual-console {
            width: 800px;
            height: 120px;
            background-color: #000000;
            border: 2px solid #4a5568;
            border-radius: 6px;
            margin-top: 10px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="lobby">
        <h2>🍳 聯機大廚房</h2>
        <div class="input-group">
            <label for="room-input">請輸入房間號碼</label>
            <input type="number" id="room-input" value="1234">
        </div>
        <div class="input-group">
            <label for="name-input">你的大廚暱稱</label>
            <input type="text" id="name-input" placeholder="例如: 小明">
        </div>
        <button id="join-btn">進入廚房 ➔</button>
    </div>
    <div id="game-container"></div>
</div>

<div id="visual-console"></div>

<script>
    // ==========================================
    // 0. 核心除錯機制 (劫持 Console 輸出)
    // ==========================================
    const consoleDiv = document.getElementById('visual-console');
    function logToScreen(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        const color = isError ? '#fc8181' : '#68d391';
        consoleDiv.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight; // 自動捲動到最下方
    }

    // 監聽全域 JavaScript 錯誤
    window.onerror = function(message, source, lineno, colno, error) {
        logToScreen(`❌ 程式崩潰: ${message} (第 ${lineno} 行)`, true);
        return false;
    };

    logToScreen("🚀 系統初始化中... 內建 Console 已就緒。");

    // ==========================================
    // 1. 內建 SVG 蔬菜素材
    // ==========================================
    const svgTomato = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="30" ry="8" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#e53e3e"/><path d="M 50 20 L 38 28 L 50 26 L 62 28 Z" fill="#38a169"/><rect x="48" y="10" width="4" height="12" fill="#276749" rx="2"/></svg>`);
    const svgCarrot = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="20" ry="6" fill="rgba(0,0,0,0.15)"/><path d="M 35 40 Q 50 100 65 40 Z" fill="#dd6b20"/><path d="M 50 32 Q 50 -5 50 25" fill="#38a169" stroke="#38a169" stroke-width="4"/></svg>`);
    const svgCabbage = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#68d391"/><path d="M 20 65 Q 50 15 80 65 Z" fill="#48bb78"/></svg>`);

    // ==========================================
    // 2. 全域聯機變數
    // ==========================================
    let gameRoomId = "";
    let playerNickname = "";
    const uniqueClientId = 'Chef_' + Math.floor(Math.random() * 10000);
    let mqttClient = null;
    let roomTopic = "";

    // ==========================================
    // 3. Phaser 遊戲場景
    // ==========================================
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        preload() {
            logToScreen("ℹ️ Phaser 開始載入蔬菜素材...");
            this.load.svg('tomato', svgTomato);
            this.load.svg('carrot', svgCarrot);
            this.load.svg('cabbage', svgCabbage);
        }

        create() {
            logToScreen("ℹ️ Phaser 場景初始化成功，繪製畫布中。");
            this.add.rectangle(400, 240, 800, 480, 0x2d3748);
            
            // 邊界提示
            this.add.rectangle(50, 240, 100, 480, 0x000000, 0.2);
            this.add.rectangle(750, 240, 100, 480, 0x000000, 0.2);
            this.add.text(20, 240, '◄ 丟', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);
            this.add.text(780, 240, '丟 ►', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);

            this.statusText = this.add.text(400, 30, '正在連線至伺服器...', { fontSize: '20px', fill: '#ecc94b' }).setOrigin(0.5);

            // 🛒 按鈕
            const spawnBtn = this.add.text(400, 420, '🛒 點我拿食材', { fontSize: '24px', fill: '#fff', backgroundColor: '#3182ce', padding: { x: 20, y: 10 } })
                .setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            spawnBtn.on('pointerdown', () => {
                const foods = ['tomato', 'carrot', 'cabbage'];
                const randomFood = foods[Math.floor(Math.random() * foods.length)];
                this.spawnFood(randomFood, 400, 240);
            });

            this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
                gameObject.x = dragX;
                gameObject.y = dragY;
            });

            this.input.on('dragend', (pointer, gameObject) => {
                if (gameObject.x < 100 || gameObject.x > 700) {
                    this.sendFood(gameObject.texture.key);
                    gameObject.destroy(); 
                } else {
                    this.tweens.add({ targets: gameObject, x: 400, y: 240, duration: 200, ease: 'Power2' });
                }
            });

            this.connectMQTT();
        }

        connectMQTT() {
            logToScreen(`📡 嘗試連線至 MQTT 伺服器... 頻道 ID: ${roomTopic}`);
            
            if (typeof mqtt === 'undefined') {
                logToScreen("❌ 錯誤：找不到 mqtt 變數，CDN 可能被瀏覽器封鎖了！", true);
                this.statusText.setText('🔴 連線失敗');
                return;
            }

            mqttClient = mqtt.connect('wss://mqttgo.io:8084/mqtt', { 
                clientId: uniqueClientId + '_' + Date.now(),
                connectTimeout: 5000
            });

            mqttClient.on('connect', () => {
                logToScreen("🟢 MQTT 連線成功！已成功訂閱房間頻道。");
                this.statusText.setText('🟢 廚房已連線！');
                mqttClient.subscribe(roomTopic);
            });

            mqttClient.on('error', (err) => {
                logToScreen(`❌ MQTT 發生錯誤: ${err.message}`, true);
            });

            mqttClient.on('message', (topic, message) => {
                if (topic === roomTopic) {
                    const data = JSON.parse(message.toString());
                    if (data.clientId !== uniqueClientId) {
                        logToScreen(`📥 收到來自 [${data.senderName}] 送來的 ${data.foodItem}`);
                        this.receiveFood(data.foodItem, data.senderName);
                    }
                }
            });
        }

        sendFood(foodKey) {
            if (mqttClient && mqttClient.connected) {
                logToScreen(`📤 正在將 ${foodKey} 丟給其他玩家...`);
                const payload = JSON.stringify({ 
                    clientId: uniqueClientId, 
                    senderName: playerNickname, 
                    foodItem: foodKey 
                });
                mqttClient.publish(roomTopic, payload);
            } else {
                logToScreen("⚠️ 傳送失敗：目前處於斷線狀態！", true);
            }
        }

        spawnFood(foodKey, x, y) {
            logToScreen(`🍳 生產了新食材: ${foodKey}`);
            const food = this.add.image(x, y, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
        }

        receiveFood(foodKey, senderName) {
            const food = this.add.image(400, -50, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            this.tweens.add({ targets: food, y: 240, duration: 500, ease: 'Bounce.easeOut' });
        }
    }

    // ==========================================
    // 4. 大廳按鈕點擊
    // ==========================================
    document.getElementById('join-btn').addEventListener('click', () => {
        const roomInput = document.getElementById('room-input').value.trim();
        const nameInput = document.getElementById('name-input').value.trim();

        if (!roomInput) {
            logToScreen("⚠️ 請輸入有效的房間號碼", true);
            return;
        }

        gameRoomId = roomInput;
        playerNickname = nameInput || '匿名大廚';
        roomTopic = `tw_game/family_style/room_${gameRoomId}`;

        logToScreen(`🚪 正在進入房間 [${gameRoomId}]，暱稱設定為: ${playerNickname}`);
        document.getElementById('lobby').style.display = 'none';

        // 啟動遊戲
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 480,
            parent: 'game-container',
            scene: GameScene
        };
        new Phaser.Game(config);
    });
</script>

</body>
</html>
