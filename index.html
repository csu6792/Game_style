<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Style - 終極修復版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #1a202c; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
        }
        /* 房間輸入畫面 */
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2d3748;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
            width: 320px;
            box-sizing: border-box;
        }
        #lobby h2 { margin-top: 0; color: #f6ad55; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #cbd5e0; font-size: 14px; }
        .input-group input { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; 
            background-color: #4a5568; color: white; font-size: 16px; box-sizing: border-box;
        }
        #join-btn {
            width: 100%; padding: 12px; border-radius: 6px; border: none;
            background-color: #48bb78; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        #join-btn:hover { background-color: #38a169; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="lobby">
        <h2>🍳 聯機大廚房</h2>
        <div class="input-group">
            <label for="room-input">請輸入房間號碼</label>
            <input type="number" id="room-input" value="1234">
        </div>
        <div class="input-group">
            <label for="name-input">你的大廚暱稱</label>
            <input type="text" id="name-input" placeholder="例如: 小明">
        </div>
        <button id="join-btn">進入廚房 ➔</button>
    </div>
    
    <div id="game-container"></div>
</div>
<script>
        var vConsole = new window.VConsole();
    </script>
<script>
    // 檢查外部資源是否成功載入，若失敗立刻彈窗提示
    window.onload = function() {
        if (typeof Phaser === 'undefined') alert('⚠️ Phaser 引擎載入失敗，請檢查網路連線！');
        if (typeof mqtt === 'undefined') alert('⚠️ MQTT 函式庫載入失敗，請檢查網路連線！');
    };

    // ==========================================
    // 1. 內建 SVG 蔬菜素材
    // ==========================================
    const svgTomato = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="30" ry="8" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#e53e3e"/><path d="M 50 20 L 38 28 L 50 26 L 62 28 Z" fill="#38a169"/><rect x="48" y="10" width="4" height="12" fill="#276749" rx="2"/></svg>`);
    const svgCarrot = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="20" ry="6" fill="rgba(0,0,0,0.15)"/><path d="M 35 40 Q 50 100 65 40 Z" fill="#dd6b20"/><path d="M 50 32 Q 50 -5 50 25" fill="#38a169" stroke="#38a169" stroke-width="4"/></svg>`);
    const svgCabbage = `data:image/svg+xml;utf8,` + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)"/><circle cx="50" cy="55" r="35" fill="#68d391"/><path d="M 20 65 Q 50 15 80 65 Z" fill="#48bb78"/></svg>`);

    // ==========================================
    // 2. 全域聯機變數
    // ==========================================
    let gameRoomId = "";
    let playerNickname = "";
    const uniqueClientId = 'Chef_' + Math.floor(Math.random() * 10000);
    let mqttClient = null;
    let roomTopic = "";

    // ==========================================
    // 3. Phaser 遊戲場景
    // ==========================================
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        preload() {
            this.load.svg('tomato', svgTomato);
            this.load.svg('carrot', svgCarrot);
            this.load.svg('cabbage', svgCabbage);
        }

        create() {
            // 繪製遊戲背景
            this.add.rectangle(400, 300, 800, 600, 0x2d3748);
            
            // 左右飛出邊界提示
            this.add.rectangle(50, 300, 100, 600, 0x000000, 0.2);
            this.add.rectangle(750, 300, 100, 600, 0x000000, 0.2);
            this.add.text(20, 300, '◄ 丟', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);
            this.add.text(780, 300, '丟 ►', { fontSize: '32px', fill: '#fff', alpha: 0.5 }).setOrigin(0.5);

            // UI 狀態文字
            this.statusText = this.add.text(400, 30, '正在初始化 MQTT...', { fontSize: '20px', fill: '#ecc94b' }).setOrigin(0.5);
            this.add.text(400, 70, `大廚: ${playerNickname} | 房間: ${gameRoomId}`, { fontSize: '16px', fill: '#a0aec0' }).setOrigin(0.5);

            // 🛒 按鈕：生成食材
            const spawnBtn = this.add.text(400, 520, '🛒 點我拿食材', { fontSize: '24px', fill: '#fff', backgroundColor: '#3182ce', padding: { x: 20, y: 10 } })
                .setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            spawnBtn.on('pointerdown', () => {
                const foods = ['tomato', 'carrot', 'cabbage'];
                const randomFood = foods[Math.floor(Math.random() * foods.length)];
                this.spawnFood(randomFood, 400, 300);
            });

            // 處理物件拖曳
            this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
                gameObject.x = dragX;
                gameObject.y = dragY;
            });

            this.input.on('dragend', (pointer, gameObject) => {
                // 判斷是否拖出左右邊界
                if (gameObject.x < 100 || gameObject.x > 700) {
                    this.sendFood(gameObject.texture.key);
                    gameObject.destroy(); 
                } else {
                    // 沒成功丟出去則彈回中央
                    this.tweens.add({ targets: gameObject, x: 400, y: 300, duration: 200, ease: 'Power2' });
                }
            });

            // 啟動 MQTT 連線
            this.connectMQTT();
        }

        connectMQTT() {
            try {
                if (typeof mqtt === 'undefined') {
                    this.statusText.setText('🔴 錯誤：MQTT 函式庫未載入，無法連線');
                    return;
                }

                // 使用極度穩定的 v4 連線語法
                mqttClient = mqtt.connect('wss://mqttgo.io:8084/mqtt', { 
                    clientId: uniqueClientId + '_' + Date.now(),
                    connectTimeout: 5000
                });

                mqttClient.on('connect', () => {
                    this.statusText.setText('🟢 廚房已連線！快叫朋友輸入同房號加入');
                    mqttClient.subscribe(roomTopic);
                });

                mqttClient.on('error', (err) => {
                    this.statusText.setText('🔴 連線失敗: ' + err.message);
                });

                mqttClient.on('message', (topic, message) => {
                    if (topic === roomTopic) {
                        try {
                            const data = JSON.parse(message.toString());
                            // 排除自己發送的訊息
                            if (data.clientId !== uniqueClientId) {
                                this.receiveFood(data.foodItem, data.senderName);
                            }
                        } catch(e) {
                            console.error("解析 MQTT 訊息失敗", e);
                        }
                    }
                });

            } catch (error) {
                this.statusText.setText('🔴 MQTT 初始化發生崩潰');
                console.error(error);
            }
        }

        sendFood(foodKey) {
            if (mqttClient && mqttClient.connected) {
                const payload = JSON.stringify({ 
                    clientId: uniqueClientId, 
                    senderName: playerNickname, 
                    foodItem: foodKey 
                });
                mqttClient.publish(roomTopic, payload, { qos: 0 });
            }
        }

        spawnFood(foodKey, x, y) {
            const food = this.add.image(x, y, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            food.setScale(0);
            this.tweens.add({ targets: food, scale: 1, duration: 300, ease: 'Back.easeOut' });
        }

        receiveFood(foodKey, senderName) {
            // 顯示文字提示誰送過來的
            const tipText = this.add.text(400, 150, `來自 ${senderName} 的食材！`, { fontSize: '18px', fill: '#48bb78' }).setOrigin(0.5);
            this.time.delayedCall(1500, () => { tipText.destroy(); });

            // 生成食材並做掉落彈跳動畫
            const food = this.add.image(400, -50, foodKey).setInteractive({ useHandCursor: true });
            this.input.setDraggable(food);
            this.tweens.add({ targets: food, y: 300, duration: 600, ease: 'Bounce.easeOut' });
        }
    }

    // ==========================================
    // 4. 大廳按鈕事件監聽
    // ==========================================
    document.getElementById('join-btn').addEventListener('click', () => {
        const roomInput = document.getElementById('room-input').value.trim();
        const nameInput = document.getElementById('name-input').value.trim();

        if (!roomInput) {
            alert('請輸入房間號碼！');
            return;
        }

        gameRoomId = roomInput;
        playerNickname = nameInput || '無名大廚_' + Math.floor(Math.random() * 100);
        roomTopic = `tw_game/family_style/room_${gameRoomId}`;

        // 隱藏登入 UI
        document.getElementById('lobby').style.display = 'none';

        // 啟動 Phaser 遊戲
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container', // 指定注入到專用 Div 中
            scene: GameScene
        };
        new Phaser.Game(config);
    });
</script>

</body>
</html>
